<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex" />
  <meta name="googlebot" content="noindex, nofollow" />
  <meta http-equiv="X-Robots-Tag" content="noindex, nofollow" />
  <title>Nowlin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;1,400&family=Martian+Mono:wght@200;300&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f8f6f1;
      --ink: #1c1c1a;
      --dim: #9a9790;
      --line: #dedad3;
      --mono: 'Martian Mono', monospace;
      --serif: 'EB Garamond', Georgia, serif;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--mono);
      font-weight: 200;
      font-size: 13px;
      line-height: 1;
      min-height: 100vh;
      padding: 80px 40px 120px;
      max-width: 640px;
      margin: 0 auto;
    }

    /* sections */
    section {
      border-top: 1px solid var(--line);
      padding: 32px 0;
      opacity: 0;
      animation: in 0.5s ease forwards;
    }

    @keyframes in {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .label {
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 20px;
    }

    /* qr grid */
    .qr-row {
      display: grid;
      grid-template-columns: 148px 1fr;
      gap: 28px;
      align-items: start;
    }

    .qr-row img {
      width: 148px;
      height: 148px;
      object-fit: contain;
      display: block;
    }

    .qr-info {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding-top: 2px;
    }

    .qr-name {
      font-family: var(--serif);
      font-size: 1.15rem;
      font-weight: 400;
      line-height: 1.2;
    }

    .qr-desc {
      font-size: 11px;
      color: var(--dim);
      line-height: 1.7;
    }

    @media (max-width: 480px) {
      body { padding: 48px 24px 80px; }
      .qr-row { grid-template-columns: 1fr; }
      .qr-row img { width: 160px; height: 160px; }
    }
  </style>
</head>
